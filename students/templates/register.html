{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row g-4 justify-content-center">
  <div class="col-lg-4">
    <div class="card shadow-sm border-0 p-4">
      <h4 class="mb-3 text-secondary fw-bold">
        <i class="bi bi-person-plus-fill me-2"></i>Create Account
      </h4>
      <form method="POST" novalidate>
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-semibold text-muted small">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
          <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
          {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-success w-100 py-2 mt-2 fw-bold">
          <i class="bi bi-check-circle me-1"></i>Register
        </button>
      </form>

      <p class="text-center text-muted small mt-3 mb-0">
        Already have an account? <a href="{% url 'login' %}">Login here</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
